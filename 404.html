<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Richard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23171717'/><text x='16' y='22' text-anchor='middle' font-size='18' fill='white' font-family='system-ui' font-weight='600'>R</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--n900:#171717;--n600:#525252;--n400:#a0a0a0;--n100:#f5f5f5;--white:#fff;--sans:'Inter',-apple-system,sans-serif;--mono:'DM Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
html{font-family:var(--sans);background:var(--n100);-webkit-font-smoothing:antialiased;}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
.wrap{max-width:400px;}
.code{font-family:var(--mono);font-size:80px;font-weight:500;letter-spacing:-2px;color:var(--n900);line-height:1;margin-bottom:16px;}
.msg{font-size:16px;line-height:26px;color:var(--n600);margin-bottom:32px;}
.back{display:inline-flex;align-items:center;gap:6px;padding:8px 20px;background:var(--n900);color:var(--white);border-radius:9999px;font-size:14px;font-weight:500;text-decoration:none;transition:transform 150ms cubic-bezier(0.16,1,0.3,1);}
.back:hover{transform:scale(1.03);}
</style>
</head>
<body>
<div class="wrap">
  <div class="code">404</div>
  <p class="msg">This page doesn't exist — or it wandered off somewhere. Either way, let's get you back.</p>
  <a href="index.html" class="back"><svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M10 7H4M4 7L7 4M4 7L7 10"/></svg>Back to work</a>
</div>
</body>
</html>
